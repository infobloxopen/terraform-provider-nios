name: Integration Tests

on:
  schedule:
    - cron: '30 3 * * 1-5'
    - cron: '30 12 * * 1-5'

# Only one pipeline per branch at a time
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pipeline:
    name: Integration Test Pipeline
    runs-on: ubuntu-latest

    # Timeout on the entire job
    timeout-minutes: 180    # 3 hours

    steps:
      # ------------------------------------------------------------------ #
      # 0.  Checkout repository
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v5.0.0

      # ------------------------------------------------------------------ #
      # 1.  Prepare the Gist signal channel
      #     Extracts Gist ID from the pre-created Gist URL stored in secrets.
      #     The signal file is keyed by commit SHA.
      # ------------------------------------------------------------------ #
      - name: Extract signal Gist ID
        id: gist
        env:
          GH_SIGNAL_GIST_URL: ${{ secrets.GH_SIGNAL_GIST_URL }}   # URL of pre-created Gist
        run: |
          if [ -z "$GH_SIGNAL_GIST_URL" ]; then
            echo "::error::GH_SIGNAL_GIST_URL secret not set. Expected format: https://gist.github.com/{user}/{gist_id}"
            exit 1
          fi
          
          # Extract gist_id from URL (last part after final /)
          GIST_ID="${GH_SIGNAL_GIST_URL##*/}"
          
          if [ -z "$GIST_ID" ]; then
            echo "::error::Could not extract GIST_ID from URL: $GH_SIGNAL_GIST_URL"
            exit 1
          fi
          
          echo "::add-mask::$GIST_ID"
          echo "gist_id=$GIST_ID" >> "$GITHUB_OUTPUT"
          echo "Signal Gist ID extracted successfully."

      # ------------------------------------------------------------------ #
      # 1b. Initialise signal Gist for this run
      #     Writes only this run's ci-signal-{sha}.json. Includes a created_at
      #     timestamp used by the cleanup step for age-based pruning.
      # ------------------------------------------------------------------ #
      - name: Initialise signal Gist
        env:
          GH_TOKEN: ${{ secrets.GH_SIGNAL_TOKEN }}
          GIST_ID:  ${{ steps.gist.outputs.gist_id }}
        run: |
          python3 - <<'EOF' > /tmp/gist-payload.json
          import json
          from datetime import datetime, timezone

          sha = '${{ github.sha }}'
          print(json.dumps({
              'files': {
                  f'ci-signal-{sha}.json': {
                      'content': json.dumps({
                          'sha':        sha,
                          'ref':        '${{ github.ref_name }}',
                          'status':     'waiting',
                          'stage':      '',
                          'message':    '',
                          'artifacts':  [],
                          'created_at': datetime.now(timezone.utc).isoformat(),
                      })
                  }
              }
          }))
          EOF

          http_code=$(curl -sS -o /tmp/gist-response.json -w "%{http_code}" -X PATCH \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            --data @/tmp/gist-payload.json \
            "https://api.github.com/gists/$GIST_ID")

          rm -f /tmp/gist-payload.json

          if [ "$http_code" != "200" ]; then
            echo "::error::Failed to initialise signal Gist $GIST_ID (HTTP $http_code)."
            cat /tmp/gist-response.json
            rm -f /tmp/gist-response.json
            exit 1
          fi

          rm -f /tmp/gist-response.json
          echo "Signal Gist initialised for commit ${{ github.sha }}."

      # ------------------------------------------------------------------ #
      # 2.  Wait for Jenkins to pick up the commit (Poll SCM delay + startup)
      # ------------------------------------------------------------------ #
      - name: Wait for Job to Start
        env:
          GH_TOKEN:        ${{ secrets.GH_SIGNAL_TOKEN }}
          GIST_ID:         ${{ steps.gist.outputs.gist_id }}
          GIT_SHA:         ${{ github.sha }}
          STAGE_NAME:      job-started
          TIMEOUT_SECONDS: "720"    # 12 min: up to 12 min Poll SCM + startup
        run: python3 .github/actions/integration-tests/wait_for_signal.py

      # ------------------------------------------------------------------ #
      # 3.  Wait for env-setup stage signal
      # ------------------------------------------------------------------ #
      - name: Environment Setup
        env:
          GH_TOKEN:        ${{ secrets.GH_SIGNAL_TOKEN }}
          GIST_ID:         ${{ steps.gist.outputs.gist_id }}
          GIT_SHA:         ${{ github.sha }}
          STAGE_NAME:      env-setup
          TIMEOUT_SECONDS: "300"     # 5 min for env setup
        run: python3 .github/actions/integration-tests/wait_for_signal.py

      # ------------------------------------------------------------------ #
      # 4.  Wait for tests-complete signal (Jenkins sends artifact URLs here)
      # ------------------------------------------------------------------ #
      - name: Run tests and wait for completion
        env:
          GH_TOKEN:        ${{ secrets.GH_SIGNAL_TOKEN }}
          GIST_ID:         ${{ steps.gist.outputs.gist_id }}
          GIT_SHA:         ${{ github.sha }}
          STAGE_NAME:      tests-complete
          TIMEOUT_SECONDS: "9000"    # 2 and half hours for tests
        run: python3 .github/actions/integration-tests/wait_for_signal.py

      # ------------------------------------------------------------------ #
      # 5.  Fetch JUnit XML files uploaded to the signal Gist by Jenkins
      # ------------------------------------------------------------------ #
      - name: Download test artifacts
        env:
          GH_TOKEN: ${{ secrets.GH_SIGNAL_TOKEN }}
          GIST_ID:  ${{ steps.gist.outputs.gist_id }}
          GIT_SHA:  ${{ github.sha }}
        run: |
          mkdir -p test-results

          python3 - <<'EOF'
          import os, json, urllib.request, sys

          gist_id = os.environ["GIST_ID"]
          git_sha = os.environ["GIT_SHA"]
          token   = os.environ["GH_TOKEN"]

          # Fetch the Gist to find JUnit files written by Jenkins
          req = urllib.request.Request(
              f"https://api.github.com/gists/{gist_id}",
              headers={"Authorization": f"token {token}",
                       "Accept": "application/vnd.github+json"})
          with urllib.request.urlopen(req) as r:
              gist = json.load(r)

          prefix = f"ci-junit-{git_sha}-"
          count  = 0
          for fname, fdata in gist["files"].items():
              if not fname.startswith(prefix):
                  continue
              local_name = os.path.basename(fname[len(prefix):])
              if not local_name or os.sep in local_name or local_name.startswith("."):
                  print(f"::warning::Skipping unsafe filename '{fname}' — rejected after sanitization.")
                  continue
              dest = os.path.join("test-results", local_name)
              print(f"Fetching {fname} → {dest} ...")
              # Use raw_url for files >1 MB (Gist API truncates them)
              if fdata.get("truncated"):
                  dl_req = urllib.request.Request(
                      fdata["raw_url"],
                      headers={"Authorization": f"token {token}"})
                  with urllib.request.urlopen(dl_req) as r:
                      content = r.read().decode()
              else:
                  content = fdata.get("content") or ""
              with open(dest, "w") as f:
                  f.write(content)
              count += 1

          if count == 0:
              print("::warning::No JUnit XML files found in Gist for this commit.")
          else:
              print(f"Fetched {count} JUnit file(s) from Gist.")
          EOF

      # ------------------------------------------------------------------ #
      # 6.  Parse JUnit XML → job summary
      # ------------------------------------------------------------------ #
      - name: Parse results and write summary
        run: |
          python3 .github/actions/integration-tests/parse_junit.py \
            --results-dir  test-results \
            --summary-file "$GITHUB_STEP_SUMMARY" \
            --output-file  test-results/summary.json

      # ------------------------------------------------------------------ #
      # 7.  Upload artifacts
      # ------------------------------------------------------------------ #
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.sha }}
          path: test-results/
          retention-days: 15

      # ------------------------------------------------------------------ #
      # 8.  Evaluate results
      # ------------------------------------------------------------------ #
      - name: Evaluate result
        run: |
          python3 - <<'EOF'
          import json, sys
          try:
              with open("test-results/summary.json") as f:
                  d = json.load(f)
          except FileNotFoundError:
              print("::error::summary.json not found — artifact download may have failed.")
              sys.exit(1)

          if d.get("total", 0) == 0:
              print("::error::No tests were recorded. JUnit XML artifacts may be missing or empty.")
              sys.exit(1)

          if d["failures"] > 0 or d["errors"] > 0:
              print(f"::error::{d['failures']} test failure(s), {d['errors']} error(s). See job summary for details.")
              sys.exit(1)

          print(f"All {d['total']} tests passed.")
          EOF

      # ------------------------------------------------------------------ #
      # 9.  Cleanup Gist
      #     Deletes this run's files (ci-signal-{sha} + ci-junit-{sha}-*),
      #     then prunes any signal files older than 24 h and their JUnit
      #     files
      # ------------------------------------------------------------------ #
      - name: Cleanup Gist
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_SIGNAL_TOKEN }}
          GIST_ID:  ${{ steps.gist.outputs.gist_id }}
          GIT_SHA:  ${{ github.sha }}
        run: |
          python3 - <<'EOF'
          import json, os, sys, urllib.request
          from datetime import datetime, timezone, timedelta

          gist_id = os.environ["GIST_ID"]
          git_sha = os.environ["GIT_SHA"]
          token   = os.environ["GH_TOKEN"]

          req = urllib.request.Request(
              f"https://api.github.com/gists/{gist_id}",
              headers={"Authorization": f"token {token}",
                       "Accept": "application/vnd.github+json"})
          try:
              with urllib.request.urlopen(req) as r:
                  gist = json.load(r)
          except Exception as exc:
              print(f"::warning::Could not fetch Gist for cleanup: {exc}")
              sys.exit(0)

          files   = gist.get("files", {})
          cutoff  = datetime.now(timezone.utc) - timedelta(hours=24)
          to_delete = {}

          # Always delete this run's signal and JUnit files
          for fname in files:
              if fname == f"ci-signal-{git_sha}.json" or fname.startswith(f"ci-junit-{git_sha}-"):
                  to_delete[fname] = None

          # Age-prune: any signal file with created_at older than 24 h
          for fname, fdata in files.items():
              if not fname.startswith("ci-signal-") or fname in to_delete:
                  continue
              try:
                  content    = json.loads(fdata.get("content") or "{}")
                  created_at = datetime.fromisoformat(content["created_at"])
                  if created_at >= cutoff:
                      continue
                  stale_sha = content.get("sha", "")
                  to_delete[fname] = None
                  for jf in files:
                      if jf.startswith(f"ci-junit-{stale_sha}-"):
                          to_delete[jf] = None
              except (KeyError, ValueError):
                  continue

          if not to_delete:
              print("Nothing to clean up.")
              sys.exit(0)

          patch_req = urllib.request.Request(
              f"https://api.github.com/gists/{gist_id}",
              data=json.dumps({"files": to_delete}).encode(),
              headers={"Authorization": f"token {token}",
                       "Accept": "application/vnd.github+json",
                       "Content-Type": "application/json"},
              method="PATCH")
          try:
              with urllib.request.urlopen(patch_req) as r:
                  r.read()
              print(f"Deleted {len(to_delete)} file(s): {', '.join(to_delete)}")
          except Exception as exc:
              print(f"::warning::Gist cleanup PATCH failed: {exc}")
          EOF

